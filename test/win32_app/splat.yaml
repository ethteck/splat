options:
  base_path: split
  platform: win32
  compiler: MSVC6
  basename: win32_app
  build_path: build
  target_path: ../win32_app.exe
  asm_path: asm
  src_path: src
  data_path: data
  ld_script_path: win32_app.ld
  cache_path: .splache
  symbol_addrs_path: generated.symbols.txt
  undefined_funcs_auto_path: undefined_funcs_auto.txt
  undefined_syms_auto_path: undefined_syms_auto.txt
  asset_path: assets
  section_order: [".header", ".text", ".data", ".rodata", ".bss"]

segments:
  - name: header
    type: header
    start: 0x0

  - name: text
    type: code
    start: 0x200
    vram: 0x00401000
    subsegments:
      - [0x200, text, main_text]

  - name: data
    type: code
    start: 0x400
    vram: 0x00402000
    subsegments:
      - [0x400, data, main_data]

  - { name: bss, type: bss, vram: 0x00403000, bss_size: 0x100 }

  - [0x600]
